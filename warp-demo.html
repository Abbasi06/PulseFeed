<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Warp Speed Background Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ffffff;
      min-height: 100vh;
      font-family: 'Google Sans', 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    /* ── Canvas fixed behind everything ── */
    #warp-canvas {
      position: fixed;
      inset: 0;
      z-index: -1;
      display: block;
    }

    /* ── Demo overlay – replace with your own onboarding UI ── */
    .demo-overlay {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
      padding: 24px;
      text-align: center;
    }

    .demo-overlay h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 600;
      color: #202124;
      letter-spacing: -0.02em;
    }

    .demo-overlay p {
      font-size: 1.1rem;
      color: #5f6368;
      max-width: 480px;
      line-height: 1.6;
    }

    .demo-overlay .badge {
      background: rgba(255,255,255,0.85);
      border: 1px solid rgba(0,0,0,0.08);
      backdrop-filter: blur(12px);
      border-radius: 999px;
      padding: 6px 18px;
      font-size: 0.85rem;
      color: #4285F4;
      font-weight: 500;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>

  <canvas id="warp-canvas"></canvas>

  <!-- ── Your onboarding/landing UI goes here ── -->
  <div class="demo-overlay">
    <span class="badge">WARP BACKGROUND DEMO</span>
    <h1>Place your UI here</h1>
    <p>The canvas sits at z-index&nbsp;-1. Drop any HTML structure on top and it just works.</p>
  </div>

  <script>
    (() => {
      'use strict';

      // ── Config ──────────────────────────────────────────────
      const COLORS   = ['#4285F4', '#EA4335', '#FBBC05', '#34A853', '#A142F4'];
      const COUNT    = 220;          // number of particles
      const BASE_SPD = 0.35;        // min speed (px/frame at radius 0)
      const SPD_RAND = 0.4;         // extra random speed
      const ACCEL    = 9;           // acceleration multiplier (higher = more warp)
      const MIN_LEN  = 2.5;         // dash length near center
      const STRETCH  = 28;          // extra length added at full distance
      const LINE_W   = 1.6;         // stroke width
      const SPAWN_R  = 18;          // max spawn radius from center

      // ── Canvas setup ────────────────────────────────────────
      const canvas = document.getElementById('warp-canvas');
      const ctx    = canvas.getContext('2d');

      let W, H, CX, CY, MAX_R;

      function resize() {
        W  = canvas.width  = window.innerWidth;
        H  = canvas.height = window.innerHeight;
        CX = W / 2;
        CY = H / 2;
        MAX_R = Math.hypot(W, H) / 2 + 20; // slight overshoot before reset
      }

      window.addEventListener('resize', resize);
      resize();

      // ── Particle class ───────────────────────────────────────
      class Particle {
        constructor() { this._spawn(true); }

        // spawn(cold=false) → start at a random radius across the field
        // spawn(cold=true)  → start anywhere for a pre-warmed look on load
        _spawn(cold = false) {
          this.angle  = Math.random() * Math.PI * 2;
          this.radius = cold
            ? Math.random() * MAX_R * 0.8
            : Math.random() * SPAWN_R + 1;
          this.speed  = BASE_SPD + Math.random() * SPD_RAND;
          this.color  = COLORS[Math.floor(Math.random() * COLORS.length)];
          this.alpha  = 0.55 + Math.random() * 0.45;
        }

        update() {
          const progress = this.radius / MAX_R;           // 0 → 1
          const accel    = 1 + progress * progress * ACCEL;
          this.radius   += this.speed * accel;
          if (this.radius > MAX_R) this._spawn(false);
        }

        draw() {
          const progress = Math.min(this.radius / MAX_R, 1);

          // Current tip position
          const tx = CX + Math.cos(this.angle) * this.radius;
          const ty = CY + Math.sin(this.angle) * this.radius;

          // Tail length stretches with speed
          const len = MIN_LEN + progress * STRETCH;

          // Tail position (opposite direction of travel)
          const tailR = Math.max(0, this.radius - len);
          const bx    = CX + Math.cos(this.angle) * tailR;
          const by    = CY + Math.sin(this.angle) * tailR;

          // Fade in during the first ~15% of journey, full opacity after
          const fadeIn = Math.min(1, progress / 0.15);

          ctx.beginPath();
          ctx.moveTo(bx, by);
          ctx.lineTo(tx, ty);
          ctx.strokeStyle = this.color;
          ctx.globalAlpha = fadeIn * this.alpha;
          ctx.lineWidth   = LINE_W;
          ctx.lineCap     = 'round';
          ctx.stroke();
        }
      }

      // ── Particle pool ────────────────────────────────────────
      const particles = Array.from({ length: COUNT }, () => new Particle());

      // ── Animation loop ───────────────────────────────────────
      function frame() {
        ctx.clearRect(0, 0, W, H);
        ctx.globalAlpha = 1;

        for (const p of particles) {
          p.update();
          p.draw();
        }

        ctx.globalAlpha = 1;
        requestAnimationFrame(frame);
      }

      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
