# ============================================================================
# PulseBoard — Root Compose (4-Node Architecture)
# ─────────────────────────────────────────────────────────────────────────────
# Shared infra:
#   postgres           — PostgreSQL + pgvector          (port 5432)
#   redis              — Celery broker + rate limiter   (port 6379)
# PulseFeed (user-serving):
#   pulsefeed_backend  — FastAPI serving API            (port 8000)
#   pulsefeed_frontend — React user SPA (nginx)         (port 3000)
# PulseGen (ingestion pipeline):
#   pulsegen_worker    — Celery ingestion worker        (no external port)
#   pulsegen_beat      — Celery beat scheduler          (no external port)
#   pulsegen_admin     — FastAPI admin API              (port 8001)
#   pulsegen_frontend  — React ops dashboard (nginx)    (port 3001)
# Optional:
#   flower             — Celery monitor, profile:monitoring (port 5555)
# ============================================================================

x-shared-env: &shared-env
  DATABASE_URL: postgresql://pulseboard:${POSTGRES_PASSWORD:-testpassword}@postgres:5432/pulseboard
  STORAGE_DATABASE_URL: postgresql://pulseboard:${POSTGRES_PASSWORD:-testpassword}@postgres:5432/pulseboard
  REDIS_URL: redis://redis:6379/0
  # llama.cpp servers — run natively on the host (full RAM, no container memory cap).
  # See docs/llama-cpp-setup.md for model download and server startup instructions.
  # Light server (port 8080, gemma3-1b ~0.8 GB): gatekeeper binary classification + validator scoring
  LLM_LIGHT_URL: ${LLM_LIGHT_URL:-http://host.docker.internal:8080/v1}
  # Heavy server (port 8081, gemma4 ~9.4 GB): extractor structured JSON extraction
  LLM_HEAVY_URL: ${LLM_HEAVY_URL:-http://host.docker.internal:8081/v1}
  # Embedding server (port 8082, nomic-embed-text ~0.3 GB): 768-dim vector search
  LLM_EMBED_URL: ${LLM_EMBED_URL:-http://host.docker.internal:8082/v1}
  LLM_API_KEY: ${LLM_API_KEY:-local}
  SECRET_KEY: ${SECRET_KEY:-dev-secret-change-before-production}
  ADMIN_API_KEY: ${ADMIN_API_KEY:-changeme-set-in-env}

services:
  # --------------------------------------------------------------------------
  # Ollama in Docker — optional alternative to llama.cpp for small models only.
  # Activate with: docker compose --profile local-ollama up
  # NOTE: Docker/WSL2 memory caps prevent running gemma4 (~10 GiB) in a container.
  #       Default inference is llama.cpp running natively on the host (see x-shared-env).
  # --------------------------------------------------------------------------

  ollama:
    image: ollama/ollama
    restart: unless-stopped
    profiles:
      - local-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment for NVIDIA GPU passthrough:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # --------------------------------------------------------------------------
  # Shared infrastructure
  # --------------------------------------------------------------------------

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: pulseboard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-testpassword}
      POSTGRES_DB: pulseboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulseboard"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --------------------------------------------------------------------------
  # PulseFeed — user-serving backend
  # --------------------------------------------------------------------------

  pulsefeed_backend:
    build:
      context: ./pulsefeed/backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *shared-env
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # PulseGen — ingestion worker
  # --------------------------------------------------------------------------

  pulsegen_worker:
    build:
      context: ./pulsegen/backend
      target: runtime
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *shared-env
      GENERATOR_DB_PATH: /data/generator.db
    volumes:
      - generator_db:/data
    command: celery -A src.celery_app worker --pool=threads --concurrency=8 --loglevel=info -Q generator
    deploy:
      replicas: 2

  pulsegen_beat:
    build:
      context: ./pulsegen/backend
      target: runtime
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *shared-env
      GENERATOR_DB_PATH: /data/generator.db
    volumes:
      - generator_db:/data
    command: celery -A src.celery_app beat --loglevel=info

  pulsegen_admin:
    build:
      context: ./pulsegen/backend
      target: admin_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *shared-env
      GENERATOR_DB_PATH: /data/generator.db
    volumes:
      - generator_db:/data
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  pulsegen_frontend:
    build:
      context: ./pulsegen/frontend
      args:
        VITE_ADMIN_API_URL: http://localhost:8001
        VITE_ADMIN_API_KEY: ${ADMIN_API_KEY:-changeme-set-in-env}
    restart: unless-stopped
    depends_on:
      - pulsegen_admin
    ports:
      - "3001:3001"

  # --------------------------------------------------------------------------
  # PulseFeed — user SPA
  # --------------------------------------------------------------------------

  pulsefeed_frontend:
    build:
      context: ./pulsefeed/frontend
    restart: unless-stopped
    depends_on:
      - pulsefeed_backend
    ports:
      - "3000:3000"

  # --------------------------------------------------------------------------
  # Monitoring (profile: monitoring — opt-in)
  # --------------------------------------------------------------------------

  flower:
    image: mher/flower:2.0
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    ports:
      - "5555:5555"
    profiles:
      - monitoring

volumes:
  postgres_data:
  redis_data:
  generator_db:
  ollama_data:
