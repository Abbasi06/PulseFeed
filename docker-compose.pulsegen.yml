version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: pulseboard
      POSTGRES_PASSWORD: testpassword
      POSTGRES_DB: pulseboard
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulseboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  pulsegen_worker:
    build:
      context: ./pulsegen/backend
      target: runtime
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      STORAGE_DATABASE_URL: postgresql://pulseboard:testpassword@postgres:5432/pulseboard
      REDIS_URL: redis://redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY:-dummy-key-for-test}
      GENERATOR_DB_PATH: ./generator.db
    volumes:
      - ./pulsegen/backend/generator.db:/app/generator.db
    command: celery -A src.celery_app worker --pool=gevent --concurrency=4 --loglevel=info

  pulsegen_beat:
    build:
      context: ./pulsegen/backend
      target: runtime
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      STORAGE_DATABASE_URL: postgresql://pulseboard:testpassword@postgres:5432/pulseboard
      REDIS_URL: redis://redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY:-dummy-key-for-test}
      GENERATOR_DB_PATH: ./generator.db
    volumes:
      - ./pulsegen/backend/generator.db:/app/generator.db
    command: celery -A src.celery_app beat --loglevel=info

  pulsegen_admin:
    build:
      context: ./pulsegen/backend
      target: admin_api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      STORAGE_DATABASE_URL: postgresql://pulseboard:testpassword@postgres:5432/pulseboard
      REDIS_URL: redis://redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY:-dummy-key-for-test}
      GENERATOR_DB_PATH: ./generator.db
    ports:
      - "8001:8001"
    volumes:
      - ./pulsegen/backend/generator.db:/app/generator.db
